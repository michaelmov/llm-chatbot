services:
  postgres:
    image: postgres:17-alpine
    container_name: chatbot-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_dev
      POSTGRES_DB: chatbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatbot -d chatbot']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - chatbot-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://chatbot:chatbot_dev@postgres:5432/chatbot
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-5-20250929}
      - MODEL_TEMPERATURE=${MODEL_TEMPERATURE:-0.3}
      - MODEL_MAX_TOKENS=${MODEL_MAX_TOKENS:-4096}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
